<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWITCHlan Traffic Map</title>
  <style>
    :root {
      --bg: #1e1f24; --panel: #2a2c33; --border: #3a3d46;
      --text: #e6e7ea; --muted: #9aa0ab; --accent: #ff7a18;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: flex; flex-direction: column; background: var(--bg); color: var(--text); }

    header {
      flex: 0 0 auto; display: flex; align-items: center; gap: 16px;
      padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 15px; font-weight: 600; margin: 0; }
    header .sub { font-size: 12px; color: var(--muted); }
    header .spacer { flex: 1; }
    .toolbar { display: flex; gap: 6px; }
    .toolbar button {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer;
    }
    .toolbar button:hover { border-color: var(--accent); color: var(--accent); }

    #stage {
      flex: 1 1 auto; position: relative; overflow: hidden;
      background: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0) 0 0 / 28px 28px, var(--bg);
      cursor: grab;
    }
    #stage.panning { cursor: grabbing; }
    #viewport { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
    #viewport .paper { background: #fff; border-radius: 4px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); padding: 8px; }
    #viewport svg { display: block; }

    /* overlay link styling */
    .traffic-link { stroke-linecap: round; cursor: pointer; transition: stroke-width .1s, stroke .1s; }
    .traffic-link.nodata { stroke: #b9c0cc; stroke-opacity: .35; }

    #hud { position: absolute; left: 12px; bottom: 12px; background: rgba(0,0,0,.55);
      color: var(--muted); font-size: 11px; padding: 5px 9px; border-radius: 6px; pointer-events: none; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }

    #legend { position: absolute; right: 12px; top: 12px; background: rgba(0,0,0,.6);
      padding: 10px 12px; border-radius: 8px; font-size: 11px; color: var(--text); width: 160px; }
    #legend .bar { height: 10px; border-radius: 5px; margin: 6px 0 4px;
      background: linear-gradient(90deg,#3b6,#fd0,#f93,#e22); }
    #legend .row { display: flex; justify-content: space-between; color: var(--muted); }

    #tooltip { position: absolute; pointer-events: none; background: rgba(10,11,14,.95);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-size: 12px;
      color: var(--text); display: none; z-index: 10; white-space: nowrap; }
    #tooltip b { color: var(--accent); }

    footer {
      flex: 0 0 auto; display: flex; align-items: center; gap: 14px;
      padding: 10px 16px; background: var(--panel); border-top: 1px solid var(--border);
    }
    footer button { background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
    footer button:hover { border-color: var(--accent); }
    #time-slider { flex: 1; accent-color: var(--accent); }
    #time-label { font-variant-numeric: tabular-nums; font-size: 13px; min-width: 168px; }
    #matched { font-size: 12px; color: var(--muted); min-width: 92px; text-align: right; }
    footer input[type="datetime-local"] {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; font-size: 13px;
    }
    .speed { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }
    .speed select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>SWITCHlan Optical Backbone — Traffic</h1>
      <div class="sub" id="subtitle">loading…</div>
    </div>
    <div class="spacer"></div>
    <div class="toolbar">
      <button id="zoom-in">+</button>
      <button id="zoom-out">&minus;</button>
      <button id="zoom-reset">Fit</button>
    </div>
  </header>

  <div id="stage">
    <div id="viewport"><div class="paper" id="paper"></div></div>
    <div id="legend">
      <div>Link load (max of in/out)</div>
      <div class="bar"></div>
      <div class="row"><span>0</span><span id="legend-max">10 Gbps</span></div>
      <div class="row" style="margin-top:6px;"><span style="color:#b9c0cc;">— no data at this time</span></div>
    </div>
    <div id="hud">scroll = zoom · drag = pan · hover a link for detail</div>
    <div id="tooltip"></div>
    <div id="loading">Loading map…</div>
  </div>

  <footer>
    <button id="play">▶</button>
    <span id="time-label">—</span>
    <input type="datetime-local" id="time-input" />
    <input type="range" id="time-slider" min="0" max="100" value="0" />
    <span class="speed">step
      <select id="step-size">
        <option value="300">5 min</option>
        <option value="3600" selected>1 hour</option>
        <option value="21600">6 hours</option>
        <option value="86400">1 day</option>
      </select>
    </span>
    <span id="matched"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
